version: "3.8"

services:
  app:
    build: ..
    ports:
      - "8000:8000"
    volumes:
      - app-data:/app/data
    environment:
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:8000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  app-data:
